        - heading "Harness design for long-running application development" [level=1] [ref=e39]
        - generic [ref=e40]:
          - paragraph [ref=e41]: Published Mar 24, 2026
          - paragraph [ref=e42]: Harness design is key to performance at the frontier of agentic coding. Here's how we pushed Claude further in frontend design and long-running autonomous software engineering.
    - generic [ref=e43]:
      - article [ref=e44]:
        - generic [ref=e46]:
          - paragraph [ref=e47]:
            - emphasis [ref=e48]:
              - text: Written by Prithvi Rajasekaran, a member of our
              - link "Labs" [ref=e49] [cursor=pointer]:
                - /url: https://www.anthropic.com/news/introducing-anthropic-labs
              - text: team.
          - paragraph [ref=e50]
          - paragraph [ref=e51]:
            - text: "Over the past several months I’ve been working on two interconnected problems: getting Claude to produce high-quality frontend designs, and getting it to build complete applications without human intervention. This work originated with earlier efforts on our"
            - link "frontend design skill" [ref=e52] [cursor=pointer]:
              - /url: https://github.com/anthropics/claude-code/blob/main/plugins/frontend-design/skills/frontend-design/SKILL.md
            - text: and
            - link "long-running coding agent harness" [ref=e53] [cursor=pointer]:
              - /url: https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents
            - text: ", where my colleagues and I were able to improve Claude’s performance well above baseline through prompt engineering and harness design—but both eventually hit ceilings."
          - paragraph
          - paragraph [ref=e54]:
            - text: To break through, I sought out novel AI engineering approaches that held across two quite different domains, one defined by subjective taste, the other by verifiable correctness and usability. Taking inspiration from
            - link "Generative Adversarial Networks" [ref=e55] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Generative_adversarial_network
            - text: (GANs), I designed a multi-agent structure with a
            - strong [ref=e56]: generator
            - text: and
            - strong [ref=e57]: evaluator
            - text: agent. Building an evaluator that graded outputs reliably—and with taste—meant first developing a set of criteria that could turn subjective judgments like “is this design good?” into concrete, gradable terms.
          - paragraph
          - paragraph [ref=e58]: "I then applied these techniques to long-running autonomous coding, carrying over two lessons from our earlier harness work: decomposing the build into tractable chunks, and using structured artifacts to hand off context between sessions. The final result was a three-agent architecture—planner, generator, and evaluator—that produced rich full-stack applications over multi-hour autonomous coding sessions."
          - heading "Why naive implementations fall short" [level=2] [ref=e59]
          - paragraph [ref=e60]:
            - text: We've previously shown that harness design has a substantial impact on the effectiveness of long running agentic coding. In an earlier
            - link "experiment" [ref=e61] [cursor=pointer]:
              - /url: https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents
            - text: ", we used an initializer agent to decompose a product spec into a task list, and a coding agent that implemented the tasks one feature at a time before handing off artifacts to carry context across sessions. The broader developer community has converged on similar insights, with approaches like the \""
            - link "Ralph Wiggum" [ref=e62] [cursor=pointer]:
              - /url: https://ghuntley.com/ralph/
            - text: "\" method using hooks or scripts to keep agents in continuous iteration cycles."
          - paragraph
          - paragraph [ref=e63]: But some problems remained persistent. For more complex tasks, the agent still tends to go off the rails over time. While decomposing this issue, we observed two common failure modes with agents executing these sorts of tasks.
          - paragraph
          - paragraph [ref=e64]:
            - text: First is that models tend to lose coherence on lengthy tasks as the context window fills (see our post on
            - link "context engineering" [ref=e65] [cursor=pointer]:
              - /url: https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents
            - text: ). Some models also exhibit "context anxiety," in which they begin wrapping up work prematurely as they approach what they believe is their context limit. Context resets—clearing the context window entirely and starting a fresh agent, combined with a structured handoff that carries the previous agent's state and the next steps—addresses both these issues.
          - paragraph
          - paragraph [ref=e66]: This differs from compaction, where earlier parts of the conversation are summarized in place so the same agent can keep going on a shortened history. While compaction preserves continuity, it doesn't give the agent a clean slate, which means context anxiety can still persist. A reset provides a clean slate, at the cost of the handoff artifact having enough state for the next agent to pick up the work cleanly. In our earlier testing, we found Claude Sonnet 4.5 exhibited context anxiety strongly enough that compaction alone wasn't sufficient to enable strong long task performance, so context resets became essential to the harness design. This solves the core issue, but adds orchestration complexity, token overhead, and latency to each harness run.
          - paragraph
          - paragraph [ref=e67]: A second issue, which we haven’t previously addressed, is self-evaluation. When asked to evaluate work they've produced, agents tend to respond by confidently praising the work—even when, to a human observer, the quality is obviously mediocre. This problem is particularly pronounced for subjective tasks like design, where there is no binary check equivalent to a verifiable software test. Whether a layout feels polished or generic is a judgment call, and agents reliably skew positive when grading their own work.
          - paragraph
          - paragraph [ref=e68]: However, even on tasks that do have verifiable outcomes, agents still sometimes exhibit poor judgment that impedes their performance while completing the task. Separating the agent doing the work from the agent judging it proves to be a strong lever to address this issue. The separation doesn't immediately eliminate that leniency on its own; the evaluator is still an LLM that is inclined to be generous towards LLM-generated outputs. But tuning a standalone evaluator to be skeptical turns out to be far more tractable than making a generator critical of its own work, and once that external feedback exists, the generator has something concrete to iterate against.
          - 'heading "Frontend design: making subjective quality gradable" [level=2] [ref=e69]'
          - paragraph [ref=e70]: I started by experimenting on frontend design, where the self-evaluation issue was most visible. Absent any intervention, Claude normally gravitates toward safe, predictable layouts that are technically functional but visually unremarkable.
          - paragraph
          - paragraph [ref=e71]: Two insights shaped the harness I built for frontend design. First, while aesthetics can’t be fully reduced to a score—and individual tastes will always vary—they can be improved with grading criteria that encode design principles and preferences. "Is this design beautiful?" is hard to answer consistently, but "does this follow our principles for good design?" gives Claude something concrete to grade against. Second, by separating frontend generation from frontend grading, we can create a feedback loop that drives the generator toward stronger outputs.
          - paragraph
          - paragraph [ref=e72]: "With this in mind, I wrote four grading criteria that I gave to both the generator and evaluator agents in their prompts:"
          - list [ref=e73]:
            - listitem [ref=e74]:
              - strong [ref=e75]: "Design quality:"
              - text: Does the design feel like a coherent whole rather than a collection of parts? Strong work here means the colors, typography, layout, imagery, and other details combine to create a distinct mood and identity.
            - listitem [ref=e76]:
              - strong [ref=e77]: "Originality:"
              - text: Is there evidence of custom decisions, or is this template layouts, library defaults, and AI-generated patterns? A human designer should recognize deliberate creative choices. Unmodified stock components—or telltale signs of AI generation like purple gradients over white cards—fail here.
            - listitem [ref=e78]:
              - strong [ref=e79]: "Craft:"
              - text: "Technical execution: typography hierarchy, spacing consistency, color harmony, contrast ratios. This is a competence check rather than a creativity check. Most reasonable implementations do fine here by default; failing means broken fundamentals."
            - listitem [ref=e80]:
              - strong [ref=e81]: "Functionality:"
              - text: Usability independent of aesthetics. Can users understand what the interface does, find primary actions, and complete tasks without guessing?
          - paragraph [ref=e82]: I emphasized design quality and originality over craft and functionality. Claude already scored well on craft and functionality by default, as the required technical competence tended to come naturally to the model. But on design and originality, Claude often produced outputs that were bland at best. The criteria explicitly penalized highly generic “AI slop” patterns, and by weighting design and originality more heavily it pushed the model toward more aesthetic risk-taking.
          - paragraph
          - paragraph [ref=e83]: I calibrated the evaluator using few-shot examples with detailed score breakdowns. This ensured the evaluator’s judgment aligned with my preferences, and reduced score drift across iterations.
          - paragraph
          - paragraph [ref=e84]:
            - text: I built the loop on the
            - link "Claude Agent SDK" [ref=e85] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/agent-sdk/overview
            - text: ", which kept the orchestration straightforward. A generator agent first created an HTML/CSS/JS frontend based on a user prompt. I gave the evaluator the Playwright MCP, which let it interact with the live page directly before scoring each criterion and writing a detailed critique. In practice, the evaluator would navigate the page on its own, screenshotting and carefully studying the implementation before producing its assessment. That feedback flowed back to the generator as input for the next iteration. I ran 5 to 15 iterations per generation, with each iteration typically pushing the generator in a more distinctive direction as it responded to the evaluator's critique. Because the evaluator was actively navigating the page rather than scoring a static screenshot, each cycle took real wall-clock time. Full runs stretched up to four hours. I also instructed the generator to make a strategic decision after each evaluation: refine the current direction if scores were trending well, or pivot to an entirely different aesthetic if the approach wasn't working."
          - paragraph
          - paragraph [ref=e86]: Across runs, the evaluator's assessments improved over iterations before plateauing, with headroom still remaining. Some generations refined incrementally. Others took sharp aesthetic turns between iterations.
          - paragraph
          - paragraph [ref=e87]: The wording of the criteria steered the generator in ways I didn't fully anticipate. Including phrases like "the best designs are museum quality" pushed designs toward a particular visual convergence, suggesting that the prompting associated with the criteria directly shaped the character of the output.
          - paragraph
          - paragraph [ref=e88]: While scores generally improved over iterations, the pattern was not always cleanly linear. Later implementations tended to be better as a whole, but I regularly saw cases where I preferred a middle iteration over the last one. Implementation complexity also tended to increase across rounds, with the generator reaching for more ambitious solutions in response to the evaluator’s feedback. Even on the first iteration, outputs were noticeably better than a baseline with no prompting at all, suggesting the criteria and associated language themselves steered the model away from generic defaults before any evaluator feedback led to further refinement.
          - paragraph [ref=e89]: "In one notable example, I prompted the model to create a website for a Dutch art museum. By the ninth iteration, it had produced a clean, dark-themed landing page for a fictional museum. The page was visually polished but largely in line with my expectations. Then, on the tenth cycle, it scrapped the approach entirely and reimagined the site as a spatial experience: a 3D room with a checkered floor rendered in CSS perspective, artwork hung on the walls in free-form positions, and doorway-based navigation between gallery rooms instead of scroll or click. It was the kind of creative leap that I hadn't seen before from a single-pass generation."
          - figure [ref=e92]
          - heading "Scaling to full-stack coding" [level=2] [ref=e94]
          - paragraph [ref=e95]: With these findings in hand, I applied this GAN-inspired pattern to full-stack development. The generator-evaluator loop maps naturally onto the software development lifecycle, where code review and QA serve the same structural role as the design evaluator.
          - heading "The architecture" [level=3] [ref=e96]
          - paragraph [ref=e97]:
            - text: In our earlier
            - link "long-running harness" [ref=e98] [cursor=pointer]:
              - /url: https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents
            - text: ", we had solved for coherent multi-session coding with an initializer agent, a coding agent that worked one feature at a time, and context resets between sessions. Context resets were a key unlock: the harness used Sonnet 4.5, which exhibited the “context anxiety” tendency mentioned earlier. Creating a harness that worked well across context resets was key to keeping the model on task. Opus 4.5 largely removed that behavior on its own, so I was able to drop context resets from this harness entirely. The agents were run as one continuous session across the whole build, with the"
            - link "Claude Agent SDK" [ref=e99] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/agent-sdk/overview
            - text: "'s automatic compaction handling context growth along the way."
          - paragraph
          - paragraph [ref=e100]: "For this work I built on the foundation from the original harness with a three-agent system, with each agent addressing a specific gap I'd observed in prior runs. The system contained the following agent personas:"
          - paragraph
          - paragraph [ref=e101]:
            - strong [ref=e102]: "Planner:"
            - text: Our previous long-running harness required the user to provide a detailed spec upfront. I wanted to automate that step, so I created a planner agent that took a simple 1-4 sentence prompt and expanded it into a full product spec. I prompted it to be ambitious about scope and to stay focused on product context and high level technical design rather than detailed technical implementation. This emphasis was due to the concern that if the planner tried to specify granular technical details upfront and got something wrong, the errors in the spec would cascade into the downstream implementation. It seemed smarter to constrain the agents on the deliverables to be produced and let them figure out the path as they worked. I also asked the planner to find opportunities to weave AI features into the product specs. (See example in the Appendix at the bottom.)
          - paragraph
          - paragraph [ref=e103]:
            - strong [ref=e104]: "Generator:"
            - text: The one-feature-at-a-time approach from the earlier harness worked well for scope management. I applied a similar model here, instructing the generator to work in sprints, picking up one feature at a time from the spec. Each sprint implemented the app with a React, Vite, FastAPI, and SQLite (later PostgreSQL) stack, and the generator was instructed to self-evaluate its work at the end of each sprint before handing off to QA. It also had git for version control.
          - paragraph
          - paragraph [ref=e105]:
            - strong [ref=e106]: "Evaluator:"
            - text: Applications from earlier harnesses often looked impressive but still had real bugs when you actually tried to use them. To catch these, the evaluator used the Playwright MCP to click through the running application the way a user would, testing UI features, API endpoints, and database states. It then graded each sprint against both the bugs it had found and a set of criteria modeled on the frontend experiment, adapted here to cover product depth, functionality, visual design, and code quality. Each criterion had a hard threshold, and if any one fell below it, the sprint failed and the generator got detailed feedback on what went wrong.
            - text: "Before each sprint, the generator and evaluator negotiated a sprint contract: agreeing on what \"done\" looked like for that chunk of work before any code was written. This existed because the product spec was intentionally high-level, and I wanted a step to bridge the gap between user stories and testable implementation. The generator proposed what it would build and how success would be verified, and the evaluator reviewed that proposal to make sure the generator was building the right thing. The two iterated until they agreed."
          - paragraph
          - paragraph [ref=e107]: "Communication was handled via files: one agent would write a file, another agent would read it and respond either within that file or with a new file that the previous agent would read in turn. The generator then built against the agreed-upon contract before handing the work off to QA. This kept the work faithful to the spec without over-specifying implementation too early."
          - heading "Running the harness" [level=3] [ref=e108]
          - paragraph [ref=e109]: For the first version of this harness, I used Claude Opus 4.5, running user prompts against both the full harness and a single-agent system for comparison. I used Opus 4.5 since this was our best coding model when I began these experiments.
          - paragraph
          - paragraph [ref=e110]: "I wrote the following prompt to generate a retro video game maker:"
          - blockquote [ref=e111]:
            - emphasis [ref=e112]: Create a 2D retro game maker with features including a level editor, sprite editor, entity behaviors, and a playable test mode.
          - paragraph [ref=e113]: The table below shows the harness type, length it ran for, and the total cost.
          - region [ref=e116]:
            - table [ref=e117]:
              - rowgroup [ref=e118]:
                - row "Harness Duration Cost" [ref=e119]:
                  - columnheader "Harness" [ref=e120]:
                    - strong [ref=e121]: Harness
                  - columnheader "Duration" [ref=e122]:
                    - strong [ref=e123]: Duration
                  - columnheader "Cost" [ref=e124]:
                    - strong [ref=e125]: Cost
                - row "Solo 20 min $9" [ref=e126]:
                  - cell "Solo" [ref=e127]
                  - cell "20 min" [ref=e128]
                  - cell "$9" [ref=e129]
                - row "Full harness 6 hr $200" [ref=e130]:
                  - cell "Full harness" [ref=e131]
                  - cell "6 hr" [ref=e132]
                  - cell "$200" [ref=e133]
          - paragraph [ref=e134]: The harness was over 20x more expensive, but the difference in output quality was immediately apparent.
          - paragraph
          - paragraph [ref=e135]: I was expecting an interface where I could construct a level and its component parts (sprites, entities, tile layout) then hit play to actually play the level. I started by opening the solo run’s output, and the initial application seemed in line with those expectations.
          - paragraph [ref=e136]: As I clicked through, however, issues started to emerge. The layout wasted space, with fixed-height panels leaving most of the viewport empty. The workflow was rigid. Trying to populate a level prompted me to create sprites and entities first, but nothing in the UI guided me toward that sequence. More to the point, the actual game was broken. My entities appeared on screen but nothing responded to input. Digging into the code revealed that the wiring between entity definitions and the game runtime was broken, with no surface indication of where.
          - paragraph
          - generic [ref=e138]:
            - tablist "Media carousel tabs" [ref=e139]:
              - tab "Opening screen" [selected] [ref=e140] [cursor=pointer]
              - tab "Sprite editor" [ref=e141] [cursor=pointer]
              - tab "Game play" [ref=e142] [cursor=pointer]
            - tabpanel [ref=e144]:
              - figure "Initial screen when opening the app created by the solo harness." [ref=e145]:
                - img [ref=e146]
                - generic [ref=e147]: Initial screen when opening the app created by the solo harness.
          - paragraph [ref=e148]:
            - text: After evaluating the solo run, I turned my attention to the harness run. This run started from the same one-sentence prompt, but the planner step expanded that prompt into a 16-feature spec spread across ten sprints. It went well beyond what the solo run attempted. In addition to the core editors and play mode, the spec called for a sprite animation system, behavior templates, sound effects and music, an AI-assisted sprite generator and level designer, and game export with shareable links. I gave the planner access to our
            - link "frontend design skill" [ref=e149] [cursor=pointer]:
              - /url: https://github.com/anthropics/claude-code/blob/main/plugins/frontend-design/skills/frontend-design/SKILL.md
            - text: ", which it read and used to create a visual design language for the app as part of the spec. For each sprint, the generator and evaluator negotiated a contract defining the specific implementation details for the sprint, and the testable behaviors that would be tested to verify completion."
          - paragraph
          - paragraph [ref=e150]: The app immediately showed more polish and smoothness than the solo run. The canvas used the full viewport, the panels were sized sensibly, and the interface had a consistent visual identity that tracked the design direction from the spec. Some of the clunkiness I'd seen in the solo run did remain—the workflow still didn't make it clear that you should build sprites and entities before trying to populate a level, and I had to figure that out by poking around. This read as a gap in the base model’s product intuition rather than something the harness was designed to address, though it did suggest a place where targeted iteration inside the harness could help to further improve output quality.
          - paragraph
          - paragraph [ref=e151]: Working through the editors, the new run's advantages over solo became more apparent. The sprite editor was richer and more fully featured, with cleaner tool palettes, a better color picker, and more usable zoom controls.
          - paragraph
          - paragraph [ref=e152]: Because I'd asked the planner to weave AI features into its specs, the app also came with a built-in Claude integration that let me generate different parts of the game through prompting. This significantly sped up the workflow.
          - generic [ref=e154]:
            - tablist "Media carousel tabs" [ref=e155]:
              - tab "Opening screen" [selected] [ref=e156] [cursor=pointer]
              - tab "Sprite editor" [ref=e157] [cursor=pointer]
              - tab "AI game design" [ref=e158] [cursor=pointer]
              - tab "AI game design" [ref=e159] [cursor=pointer]
              - tab "Game play" [ref=e160] [cursor=pointer]
            - tabpanel [ref=e162]:
              - 'figure "Initial screen: Creating a new game, in the app built with the full harness" [ref=e163]':
                - img [ref=e164]
                - generic [ref=e165]: "Initial screen: Creating a new game, in the app built with the full harness"
          - paragraph
          - paragraph [ref=e166]: The biggest difference was in play mode. I was actually able to move my entity and play the game. The physics had some rough edges—my character jumped onto a platform but ended up overlapping with it, which felt intuitively wrong—but the core thing worked, which the solo run did not manage. After moving around a bit, I did hit some limitations with the AI’s game level construction. There was a large wall that I wasn’t able to jump past, so I was stuck. This suggested there were some common sense improvements and edge cases that the harness could handle to further refine the app.
          - paragraph [ref=e167]: "Reading through the logs, it was clear that the evaluator kept the implementation in line with the spec. Each sprint, it walked through the sprint contract's test criteria and exercised the running application through Playwright, filing bugs against anything that diverged from expected behavior. The contracts were granular—Sprint 3 alone had 27 criteria covering the level editor—and the evaluator's findings were specific enough to act on without extra investigation. The table below shows several examples of issues our evaluator identified:"
          - region [ref=e170]:
            - table [ref=e171]:
              - rowgroup [ref=e172]:
                - row "Contract criterion Evaluator finding" [ref=e173]:
                  - columnheader "Contract criterion" [ref=e174]:
                    - strong [ref=e175]: Contract criterion
                  - columnheader "Evaluator finding" [ref=e176]:
                    - strong [ref=e177]: Evaluator finding
                - row "Rectangle fill tool allows click-drag to fill a rectangular area with selected tile FAIL — Tool only places tiles at drag start/end points instead of filling the region. fillRectangle function exists but isn't triggered properly on mouseUp." [ref=e178]:
                  - cell "Rectangle fill tool allows click-drag to fill a rectangular area with selected tile" [ref=e179]
