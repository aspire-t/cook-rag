services:
  # FastAPI 后端服务
  - type: web
    name: cook-rag
    runtime: docker
    region: singapore  # 亚洲用户延迟最低
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cook-rag-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"

  # PostgreSQL 数据库
databases:
  - name: cook-rag-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
